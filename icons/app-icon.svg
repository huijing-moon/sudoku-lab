<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="appBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <filter id="cellShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- iOS rounded rectangle background -->
  <rect width="1024" height="1024" rx="226" fill="url(#appBg)"/>

  <!-- Sudoku grid container -->
  <g transform="translate(162, 162)">
    <!-- Main 9x9 grid lines -->
    <g stroke="rgba(255, 255, 255, 0.25)" stroke-linecap="round">
      <!-- Thin lines -->
      <line x1="80" y1="0" x2="80" y2="700" stroke-width="4"/>
      <line x1="160" y1="0" x2="160" y2="700" stroke-width="4"/>
      <line x1="320" y1="0" x2="320" y2="700" stroke-width="4"/>
      <line x1="400" y1="0" x2="400" y2="700" stroke-width="4"/>
      <line x1="540" y1="0" x2="540" y2="700" stroke-width="4"/>
      <line x1="620" y1="0" x2="620" y2="700" stroke-width="4"/>

      <line x1="0" y1="80" x2="700" y2="80" stroke-width="4"/>
      <line x1="0" y1="160" x2="700" y2="160" stroke-width="4"/>
      <line x1="0" y1="320" x2="700" y2="320" stroke-width="4"/>
      <line x1="0" y1="400" x2="700" y2="400" stroke-width="4"/>
      <line x1="0" y1="540" x2="700" y2="540" stroke-width="4"/>
      <line x1="0" y1="620" x2="700" y2="620" stroke-width="4"/>
    </g>

    <!-- Thick 3x3 section lines -->
    <g stroke="rgba(255, 255, 255, 0.5)" stroke-linecap="round" stroke-width="10">
      <line x1="240" y1="0" x2="240" y2="700"/>
      <line x1="460" y1="0" x2="460" y2="700"/>
      <line x1="0" y1="240" x2="700" y2="240"/>
      <line x1="0" y1="460" x2="700" y2="460"/>
    </g>

    <!-- Border -->
    <rect x="0" y="0" width="700" height="700" rx="35" fill="none" stroke="rgba(255, 255, 255, 0.6)" stroke-width="12"/>

    <!-- Sample filled cells with numbers -->
    <g fill="white" filter="url(#cellShadow)">
      <!-- Top section -->
      <rect x="8" y="8" width="64" height="64" rx="8" opacity="0.9"/>
      <rect x="328" y="8" width="64" height="64" rx="8" opacity="0.85"/>
      <rect x="568" y="88" width="64" height="64" rx="8" opacity="0.75"/>

      <!-- Middle section -->
      <rect x="88" y="248" width="64" height="64" rx="8" opacity="0.8"/>
      <rect x="328" y="328" width="64" height="64" rx="8" opacity="0.95"/>
      <rect x="548" y="248" width="64" height="64" rx="8" opacity="0.8"/>

      <!-- Bottom section -->
      <rect x="8" y="548" width="64" height="64" rx="8" opacity="0.85"/>
      <rect x="248" y="628" width="64" height="64" rx="8" opacity="0.9"/>
      <rect x="628" y="628" width="64" height="64" rx="8" opacity="0.8"/>
    </g>

    <!-- Numbers -->
    <g font-family="system-ui, -apple-system, 'SF Pro Display', sans-serif" font-size="55" font-weight="700" fill="#667eea">
      <text x="40" y="58" text-anchor="middle">9</text>
      <text x="360" y="58" text-anchor="middle">5</text>
      <text x="600" y="138" text-anchor="middle">7</text>

      <text x="120" y="298" text-anchor="middle">3</text>
      <text x="360" y="378" text-anchor="middle">1</text>
      <text x="580" y="298" text-anchor="middle">8</text>

      <text x="40" y="598" text-anchor="middle">2</text>
      <text x="280" y="678" text-anchor="middle">6</text>
      <text x="660" y="678" text-anchor="middle">4</text>
    </g>

    <!-- Accent dots for visual interest -->
    <g fill="#f093fb" opacity="0.4">
      <circle cx="190" cy="110" r="8"/>
      <circle cx="510" cy="430" r="8"/>
      <circle cx="270" cy="550" r="8"/>
    </g>
  </g>
</svg>
