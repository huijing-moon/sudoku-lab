<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="smallBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>

  <!-- iOS rounded rectangle -->
  <rect width="180" height="180" rx="40" fill="url(#smallBg)"/>

  <!-- Sudoku grid -->
  <g transform="translate(25, 25)">
    <!-- Grid lines -->
    <g stroke="rgba(255, 255, 255, 0.25)" stroke-linecap="round">
      <line x1="14.4" y1="0" x2="14.4" y2="130" stroke-width="0.7"/>
      <line x1="28.8" y1="0" x2="28.8" y2="130" stroke-width="0.7"/>
      <line x1="57.6" y1="0" x2="57.6" y2="130" stroke-width="0.7"/>
      <line x1="72" y1="0" x2="72" y2="130" stroke-width="0.7"/>
      <line x1="100.8" y1="0" x2="100.8" y2="130" stroke-width="0.7"/>
      <line x1="115.2" y1="0" x2="115.2" y2="130" stroke-width="0.7"/>

      <line x1="0" y1="14.4" x2="130" y2="14.4" stroke-width="0.7"/>
      <line x1="0" y1="28.8" x2="130" y2="28.8" stroke-width="0.7"/>
      <line x1="0" y1="57.6" x2="130" y2="57.6" stroke-width="0.7"/>
      <line x1="0" y1="72" x2="130" y2="72" stroke-width="0.7"/>
      <line x1="0" y1="100.8" x2="130" y2="100.8" stroke-width="0.7"/>
      <line x1="0" y1="115.2" x2="130" y2="115.2" stroke-width="0.7"/>
    </g>

    <!-- 3x3 section lines -->
    <g stroke="rgba(255, 255, 255, 0.5)" stroke-linecap="round" stroke-width="2">
      <line x1="43.2" y1="0" x2="43.2" y2="130"/>
      <line x1="86.4" y1="0" x2="86.4" y2="130"/>
      <line x1="0" y1="43.2" x2="130" y2="43.2"/>
      <line x1="0" y1="86.4" x2="130" y2="86.4"/>
    </g>

    <!-- Border -->
    <rect x="0" y="0" width="130" height="130" rx="6" fill="none" stroke="rgba(255, 255, 255, 0.6)" stroke-width="2.5"/>

    <!-- Sample cells -->
    <g fill="white" opacity="0.9">
      <rect x="1.5" y="1.5" width="11.4" height="11.4" rx="1.5"/>
      <rect x="59.1" y="1.5" width="11.4" height="11.4" rx="1.5"/>
      <rect x="102.3" y="16.5" width="11.4" height="11.4" rx="1.5"/>
      <rect x="16.5" y="45.3" width="11.4" height="11.4" rx="1.5"/>
      <text x="65" y="72" text-anchor="middle" dominant-baseline="central" font-family="system-ui" font-size="10" font-weight="700" fill="#667eea">1</text>
      <rect x="59.1" y="62.1" width="11.4" height="11.4" rx="1.5"/>
      <rect x="1.5" y="102.3" width="11.4" height="11.4" rx="1.5"/>
      <rect x="45.3" y="117.3" width="11.4" height="11.4" rx="1.5"/>
      <rect x="117.3" y="117.3" width="11.4" height="11.4" rx="1.5"/>
    </g>

    <!-- Numbers in cells -->
    <g font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#667eea">
      <text x="7.2" y="10.5" text-anchor="middle">9</text>
      <text x="64.8" y="10.5" text-anchor="middle">5</text>
      <text x="108" y="25.5" text-anchor="middle">7</text>
      <text x="22.2" y="54" text-anchor="middle">3</text>
      <text x="7.2" y="111" text-anchor="middle">2</text>
      <text x="51" y="126" text-anchor="middle">6</text>
      <text x="123" y="126" text-anchor="middle">4</text>
    </g>
  </g>
</svg>
