<svg width="1170" height="2532" viewBox="0 0 1170 2532" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="splashBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="50%" stop-color="#764ba2"/>
      <stop offset="100%" stop-color="#f093fb"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1170" height="2532" fill="url(#splashBg)"/>

  <!-- Logo container (centered) -->
  <g transform="translate(435, 916)">
    <!-- Logo background -->
    <rect width="300" height="300" rx="66" fill="rgba(255, 255, 255, 0.15)" stroke="rgba(255, 255, 255, 0.3)" stroke-width="3"/>

    <!-- Grid -->
    <g transform="translate(30, 30)">
      <!-- 9x9 grid lines -->
      <g stroke="rgba(255, 255, 255, 0.25)" stroke-linecap="round">
        <line x1="27" y1="0" x2="27" y2="240" stroke-width="1.5"/>
        <line x1="53" y1="0" x2="53" y2="240" stroke-width="1.5"/>
        <line x1="107" y1="0" x2="107" y2="240" stroke-width="1.5"/>
        <line x1="133" y1="0" x2="133" y2="240" stroke-width="1.5"/>
        <line x1="187" y1="0" x2="187" y2="240" stroke-width="1.5"/>
        <line x1="213" y1="0" x2="213" y2="240" stroke-width="1.5"/>

        <line x1="0" y1="27" x2="240" y2="27" stroke-width="1.5"/>
        <line x1="0" y1="53" x2="240" y2="53" stroke-width="1.5"/>
        <line x1="0" y1="107" x2="240" y2="107" stroke-width="1.5"/>
        <line x1="0" y1="133" x2="240" y2="133" stroke-width="1.5"/>
        <line x1="0" y1="187" x2="240" y2="187" stroke-width="1.5"/>
        <line x1="0" y1="213" x2="240" y2="213" stroke-width="1.5"/>
      </g>

      <!-- 3x3 section lines -->
      <g stroke="rgba(255, 255, 255, 0.5)" stroke-linecap="round" stroke-width="3.5">
        <line x1="80" y1="0" x2="80" y2="240"/>
        <line x1="160" y1="0" x2="160" y2="240"/>
        <line x1="0" y1="80" x2="240" y2="80"/>
        <line x1="0" y1="160" x2="240" y2="160"/>
      </g>

      <!-- Border -->
      <rect x="0" y="0" width="240" height="240" rx="12" fill="none" stroke="rgba(255, 255, 255, 0.6)" stroke-width="4"/>

      <!-- Sample cells -->
      <g fill="white" opacity="0.9">
        <rect x="3" y="3" width="21" height="21" rx="3"/>
        <rect x="109" y="3" width="21" height="21" rx="3"/>
        <rect x="189" y="29" width="21" height="21" rx="3"/>
        <rect x="29" y="83" width="21" height="21" rx="3"/>
        <rect x="109" y="109" width="21" height="21" rx="3"/>
        <rect x="183" y="83" width="21" height="21" rx="3"/>
        <rect x="3" y="189" width="21" height="21" rx="3"/>
        <rect x="83" y="216" width="21" height="21" rx="3"/>
        <rect x="216" y="216" width="21" height="21" rx="3"/>
      </g>

      <!-- Numbers -->
      <g font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#667eea">
        <text x="13.5" y="18.5" text-anchor="middle">9</text>
        <text x="119.5" y="18.5" text-anchor="middle">5</text>
        <text x="199.5" y="44.5" text-anchor="middle">7</text>
        <text x="39.5" y="98.5" text-anchor="middle">3</text>
        <text x="119.5" y="124.5" text-anchor="middle">1</text>
        <text x="193.5" y="98.5" text-anchor="middle">8</text>
        <text x="13.5" y="204.5" text-anchor="middle">2</text>
        <text x="93.5" y="231.5" text-anchor="middle">6</text>
        <text x="226.5" y="231.5" text-anchor="middle">4</text>
      </g>
    </g>
  </g>

  <!-- App name -->
  <text x="585" y="1350" text-anchor="middle" font-family="system-ui, -apple-system, 'SF Pro Display', sans-serif" font-size="80" font-weight="700" fill="white">
    스도쿠
  </text>

  <!-- Loading dots -->
  <g transform="translate(545, 1450)">
    <circle cx="0" cy="0" r="8" fill="white" opacity="0.6"/>
    <circle cx="40" cy="0" r="8" fill="white" opacity="0.8"/>
    <circle cx="80" cy="0" r="8" fill="white" opacity="0.6"/>
  </g>
</svg>
